name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Byte-compile check (includes the pygame desktop client)
        run: python -m py_compile my_hexchess.py game.py server.py

      - name: Headless import smoke test (server.py only)
        run: python -c "import server"

      - name: Run tests
        run: pytest -v
